name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-firmware:
    uses: ./.github/workflows/firmware.yml
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-firmware]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
      - run: |
          mv scripts/flash.* .
          zip -r claude-knock-${{ github.ref_name }}.zip firmware flash.*
      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: claude-knock-${{ github.ref_name }}.zip
          commit: ${{ github.sha }}
          tag: ${{ github.ref_name }}
          body: |
            ### claude-knock ${{ github.ref_name }}

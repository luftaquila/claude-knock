<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>claude-knock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#121212;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#1e1e1e;border-radius:12px;padding:32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
h1{text-align:center;font-size:1.4em;margin-bottom:4px;color:#b8b8b8}
.sub{text-align:center;font-size:.85em;color:#888;margin-bottom:12px}
.gh{display:flex;justify-content:center;margin-bottom:20px}
.gh a{color:#aaa;transition:color .2s;display:inline-flex}
.gh a:hover{color:#b8b8b8}
.gh svg{width:22px;height:22px;fill:currentColor}
label{display:block;font-size:.85em;color:#aaa;margin-bottom:4px;margin-top:16px}
input[type=text],input[type=password]{width:100%;padding:10px 12px;border:1px solid #333;border-radius:8px;background:#2a2a2a;color:#e0e0e0;font-size:.95em;outline:none;transition:border .2s}
input[type=text]:focus{border-color:#b8b8b8}
input[readonly]{opacity:.7;cursor:default}
.row{display:flex;align-items:center;gap:12px}
.row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:#2a2a2a;outline:none}
.row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#b8b8b8;cursor:pointer;border:none}
.row input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#b8b8b8;cursor:pointer;border:none}
.row .val{min-width:64px;text-align:right;font-size:.9em;color:#b8b8b8;font-variant-numeric:tabular-nums}
.test-row{display:flex;align-items:stretch;gap:8px}
.test-row input[type=number]{flex:0 0 56px;padding:8px 0;border:1px solid #333;border-radius:8px;background:#2a2a2a;color:#e0e0e0;font-size:.9em;outline:none;text-align:center;-moz-appearance:textfield}
.test-row input[type=number]::-webkit-inner-spin-button,
.test-row input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.test-row input[type=number]:focus{border-color:#b8b8b8}
.cnt-btn{flex:0 0 34px;padding:0;border:1px solid #3a3a3a;border-radius:8px;background:transparent;color:#e0e0e0;font-size:1.3em;font-weight:600;cursor:pointer;transition:all .15s;margin:0;line-height:1;display:flex;align-items:center;justify-content:center}
.cnt-btn:hover{border-color:#b8b8b8;background:#b8b8b8;color:#121212}
.cnt-btn:active{transform:scale(.95)}
.test-btn{flex:1;padding:8px 12px;border:1px solid #b8b8b8;border-radius:8px;background:transparent;color:#b8b8b8;font-size:.9em;font-weight:600;cursor:pointer;transition:all .2s;margin:0}
.test-btn:hover{background:#b8b8b8;color:#121212}
.test-btn:disabled{opacity:.5;cursor:default}
button{width:100%;padding:12px;margin-top:24px;border:none;border-radius:8px;background:#b8b8b8;color:#121212;font-size:1em;font-weight:600;cursor:pointer;transition:background .2s}
button:hover{background:#d4d4d4}
button:disabled{opacity:.5;cursor:default}
.msg{text-align:center;margin-top:16px;font-size:.9em;display:none}
.msg.ok{color:#6fcf97;display:block}
.msg.err{color:#eb5757;display:block}
.section{font-size:.75em;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#b8b8b8;margin-top:24px;padding-bottom:6px;border-bottom:1px solid #333}
.section:first-of-type{margin-top:8px}
.section+label,.section+.test-row{margin-top:12px}
.diagram{width:100%;height:auto;display:block;margin:10px 0 4px 0}
@media (min-width:768px){.card{max-width:1040px;padding:40px}#f{display:grid;grid-template-columns:1fr 1.3fr;column-gap:40px;align-items:start}#f>button[type="submit"]{grid-column:1/-1}}
</style>
</head>
<body>
<div class="card">
<h1>claude-knock</h1>
<p class="sub">Device Configuration</p>
<div class="gh"><a href="https://github.com/luftaquila/claude-knock" target="_blank" rel="noopener" aria-label="GitHub repository"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a></div>
<form id="f">
<div class="col">
<div class="section">Wi-Fi</div>
<label for="wifi_ssid">SSID</label>
<input id="wifi_ssid" name="wifi_ssid" type="text" required maxlength="32" placeholder="Your Wi-Fi network">
<label for="wifi_pass">Password</label>
<input id="wifi_pass" name="wifi_pass" type="text" maxlength="64" placeholder="Wi-Fi password">
<div class="section">MQTT</div>
<label for="mqtt_server">Server</label>
<input id="mqtt_server" name="mqtt_server" type="text" required maxlength="127" placeholder="mqtts://mqtt.example.com:443">
<label for="mqtt_channel">Channel</label>
<input id="mqtt_channel" name="mqtt_channel" type="text" value="claude-knock" maxlength="64" placeholder="claude-knock">
<label for="mqtt_user">Username</label>
<input id="mqtt_user" type="text" readonly>
<label for="mqtt_pass">Password</label>
<input id="mqtt_pass" name="mqtt_pass" type="text" required maxlength="64" placeholder="MQTT ACL password">
</div>
<div class="col">
<div class="section">Jump</div>
<svg class="diagram" viewBox="0 0 440 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pulse timing diagram">
<defs>
<marker id="ar-b" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 8 4 L 0 8 Z" fill="#e779c1"/></marker>
<marker id="ar-y" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 8 4 L 0 8 Z" fill="#f2c94c"/></marker>
<marker id="ar-g" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 8 4 L 0 8 Z" fill="#6fcf97"/></marker>
<marker id="ar-r" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 8 4 L 0 8 Z" fill="#eb5757"/></marker>
<marker id="ar-bl" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 8 4 L 0 8 Z" fill="#5eafd4"/></marker>
</defs>
<text x="14" y="70" fill="#aaa" font-size="10" transform="rotate(-90 14 70)" text-anchor="middle">Duty (%)</text>
<line x1="45" y1="30" x2="380" y2="30" stroke="#333" stroke-width="1" stroke-dasharray="2 3"/>
<line id="y-hold-line" x1="45" y1="65" x2="380" y2="65" stroke="#333" stroke-width="1" stroke-dasharray="2 3"/>
<line x1="45" y1="110" x2="380" y2="110" stroke="#666" stroke-width="1"/>
<text x="42" y="33" fill="#888" font-size="9" text-anchor="end">100</text>
<text id="y-hold-text" x="42" y="68" fill="#888" font-size="9" text-anchor="end">hold</text>
<text x="42" y="113" fill="#888" font-size="9" text-anchor="end">0</text>
<g fill="none" stroke-width="2" stroke-linejoin="miter">
<path d="M 50 110 L 70 110" stroke="#888"/>
<path id="wv-b1" d="M 70 110 L 70 30 L 105 30 L 105 65" stroke="#e779c1"/>
<path id="wv-h1" d="M 105 65 L 195 65 L 195 110" stroke="#5eafd4"/>
<path id="wv-d" d="M 195 110 L 245 110" stroke="#eb5757"/>
<path id="wv-b2" d="M 245 110 L 245 30 L 280 30 L 280 65" stroke="#e779c1"/>
<path id="wv-h2" d="M 280 65 L 355 65 L 355 110" stroke="#6fcf97"/>
<path id="wv-post" d="M 355 110 L 375 110" stroke="#888"/>
</g>
<g stroke="#666" stroke-width="0.5">
<line id="tick-1" x1="70" y1="110" x2="70" y2="125"/>
<line id="tick-2" x1="105" y1="110" x2="105" y2="125"/>
<line id="tick-3" x1="195" y1="110" x2="195" y2="125"/>
<line id="tick-4" x1="245" y1="110" x2="245" y2="125"/>
<line id="tick-5" x1="280" y1="110" x2="280" y2="125"/>
<line id="tick-6" x1="355" y1="110" x2="355" y2="125"/>
</g>
<line id="span-b1" x1="70" y1="122" x2="105" y2="122" stroke="#e779c1" stroke-width="0.9" marker-start="url(#ar-b)" marker-end="url(#ar-b)"/>
<line id="span-h1" x1="105" y1="122" x2="195" y2="122" stroke="#5eafd4" stroke-width="0.9" marker-start="url(#ar-bl)" marker-end="url(#ar-bl)"/>
<line id="span-d" x1="195" y1="122" x2="245" y2="122" stroke="#eb5757" stroke-width="0.9" marker-start="url(#ar-r)" marker-end="url(#ar-r)"/>
<line id="span-b2" x1="245" y1="122" x2="280" y2="122" stroke="#e779c1" stroke-width="0.9" marker-start="url(#ar-b)" marker-end="url(#ar-b)"/>
<line id="span-h2" x1="280" y1="122" x2="355" y2="122" stroke="#6fcf97" stroke-width="0.9" marker-start="url(#ar-g)" marker-end="url(#ar-g)"/>
<g font-size="9" text-anchor="middle">
<text id="lbl-b1" x="87" y="138" fill="#e779c1">Boost</text>
<text id="lbl-h1" x="150" y="138" fill="#5eafd4">Hold 1</text>
<text id="lbl-d" x="220" y="138" fill="#eb5757">Delay</text>
<text id="lbl-b2" x="262" y="138" fill="#e779c1">Boost</text>
<text id="lbl-h2" x="317" y="138" fill="#6fcf97">Hold 2+</text>
</g>
<line id="hp-line" x1="390" y1="110" x2="390" y2="65" stroke="#f2c94c" stroke-width="0.9" marker-start="url(#ar-y)" marker-end="url(#ar-y)"/>
<text id="hp-txt1" x="400" y="82" fill="#f2c94c" font-size="9" text-anchor="start">Hold</text>
<text id="hp-txt2" x="400" y="94" fill="#f2c94c" font-size="9" text-anchor="start">Power</text>
<text x="212" y="162" fill="#aaa" font-size="10" text-anchor="middle">Time (ms)</text>
<text x="220" y="188" fill="#b8b8b8" font-size="11" font-weight="600" text-anchor="middle">Pulse Timing Diagram</text>
</svg>
<label for="boost">Boost</label>
<div class="row">
<input id="boost" type="range" min="0" max="30" step="1" value="0">
<span class="val"><span id="boost_val">0</span> ms</span>
</div>
<label for="strength">Hold (1st)</label>
<div class="row">
<input id="strength" type="range" min="0" max="100" step="1" value="80">
<span class="val"><span id="strength_val">80</span> ms</span>
</div>
<label for="strength2">Hold (2nd+)</label>
<div class="row">
<input id="strength2" type="range" min="0" max="100" step="1" value="80">
<span class="val"><span id="strength2_val">80</span> ms</span>
</div>
<label for="hold">Hold Power</label>
<div class="row">
<input id="hold" type="range" min="0" max="100" step="1" value="100">
<span class="val"><span id="hold_val">100</span> %</span>
</div>
<label for="delay">Delay</label>
<div class="row">
<input id="delay" type="range" min="50" max="1000" step="10" value="200">
<span class="val"><span id="delay_val">200</span> ms</span>
</div>
<div class="section">Test</div>
<div class="test-row">
<button type="button" id="test_dec" class="cnt-btn" aria-label="Decrease count"><svg viewBox="0 0 16 16" width="12" height="12" aria-hidden="true"><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
<input id="test_count" type="number" min="1" max="10" value="2">
<button type="button" id="test_inc" class="cnt-btn" aria-label="Increase count"><svg viewBox="0 0 16 16" width="12" height="12" aria-hidden="true"><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
<button type="button" id="test" class="test-btn">Jump!</button>
</div>
</div>
<button type="submit">Save &amp; Reboot</button>
</form>
<div id="msg" class="msg"></div>
</div>
<script>
const strength=document.getElementById("strength");
const strengthVal=document.getElementById("strength_val");
const strength2=document.getElementById("strength2");
const strength2Val=document.getElementById("strength2_val");
const delay=document.getElementById("delay");
const delayVal=document.getElementById("delay_val");
const boost=document.getElementById("boost");
const boostVal=document.getElementById("boost_val");
const hold=document.getElementById("hold");
const holdVal=document.getElementById("hold_val");

function updateDiagram(){
const b=+boost.value,h1=+strength.value,h2=+strength2.value,d=+delay.value,hp=+hold.value;
const PL=70,PR=355,PW=PR-PL,YT=30,YB=110,YR=YB-YT;
/* log compression: keeps small phases visible when delay/hold dominates.
 * Widths are not linear in ms but preserve ordering. */
const tf=x=>Math.log1p(Math.max(x,0));
const bt=tf(b),h1t=tf(h1),h2t=tf(h2),dt=tf(d);
const total=bt+h1t+dt+bt+h2t;
if(total<=0)return;
const s=PW/total;
const x0=PL,x1=x0+bt*s,x2=x1+h1t*s,x3=x2+dt*s,x4=x3+bt*s,x5=x4+h2t*s;
const yH=YB-(hp/100)*YR;
const setD=(id,d)=>document.getElementById(id).setAttribute("d",d);
setD("wv-b1",`M ${x0} ${YB} L ${x0} ${YT} L ${x1} ${YT} L ${x1} ${yH}`);
setD("wv-h1",`M ${x1} ${yH} L ${x2} ${yH} L ${x2} ${YB}`);
setD("wv-d",`M ${x2} ${YB} L ${x3} ${YB}`);
setD("wv-b2",`M ${x3} ${YB} L ${x3} ${YT} L ${x4} ${YT} L ${x4} ${yH}`);
setD("wv-h2",`M ${x4} ${yH} L ${x5} ${yH} L ${x5} ${YB}`);
const setXX=(id,x)=>{const e=document.getElementById(id);e.setAttribute("x1",x);e.setAttribute("x2",x)};
[[1,x0],[2,x1],[3,x2],[4,x3],[5,x4],[6,x5]].forEach(([i,x])=>setXX(`tick-${i}`,x));
const setSpan=(id,a,z)=>{const e=document.getElementById(id);e.setAttribute("x1",a);e.setAttribute("x2",z)};
setSpan("span-b1",x0,x1);setSpan("span-h1",x1,x2);setSpan("span-d",x2,x3);setSpan("span-b2",x3,x4);setSpan("span-h2",x4,x5);
const setLbl=(id,x)=>document.getElementById(id).setAttribute("x",x);
setLbl("lbl-b1",(x0+x1)/2);setLbl("lbl-h1",(x1+x2)/2);setLbl("lbl-d",(x2+x3)/2);setLbl("lbl-b2",(x3+x4)/2);setLbl("lbl-h2",(x4+x5)/2);
const yLine=document.getElementById("y-hold-line");
yLine.setAttribute("y1",yH);yLine.setAttribute("y2",yH);
const yText=document.getElementById("y-hold-text");
yText.setAttribute("y",yH+3);
yText.textContent=hp;
document.getElementById("hp-line").setAttribute("y2",yH);
const mid=(YB+yH)/2;
document.getElementById("hp-txt1").setAttribute("y",mid-4);
document.getElementById("hp-txt2").setAttribute("y",mid+8);
}

strength.addEventListener("input",()=>{strengthVal.textContent=strength.value;updateDiagram()});
strength.addEventListener("change",()=>{
fetch("/strength",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"strength="+encodeURIComponent(strength.value)}).catch(()=>{});
});
strength2.addEventListener("input",()=>{strength2Val.textContent=strength2.value;updateDiagram()});
strength2.addEventListener("change",()=>{
fetch("/strength2",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"strength2="+encodeURIComponent(strength2.value)}).catch(()=>{});
});
delay.addEventListener("input",()=>{delayVal.textContent=delay.value;updateDiagram()});
delay.addEventListener("change",()=>{
fetch("/delay",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"delay_ms="+encodeURIComponent(delay.value)}).catch(()=>{});
});
boost.addEventListener("input",()=>{boostVal.textContent=boost.value;updateDiagram()});
boost.addEventListener("change",()=>{
fetch("/boost",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"boost_ms="+encodeURIComponent(boost.value)}).catch(()=>{});
});
hold.addEventListener("input",()=>{holdVal.textContent=hold.value;updateDiagram()});
hold.addEventListener("change",()=>{
fetch("/hold",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"hold_duty="+encodeURIComponent(hold.value)}).catch(()=>{});
});
updateDiagram();
const testBtn=document.getElementById("test");
const testCount=document.getElementById("test_count");
const testDec=document.getElementById("test_dec");
const testInc=document.getElementById("test_inc");
const clampCount=()=>{let c=parseInt(testCount.value,10);if(!(c>=1))c=1;if(c>10)c=10;testCount.value=c;return c};
testDec.addEventListener("click",()=>{let c=clampCount();if(c>1)testCount.value=c-1});
testInc.addEventListener("click",()=>{let c=clampCount();if(c<10)testCount.value=c+1});
testCount.addEventListener("change",clampCount);
testBtn.addEventListener("click",()=>{
const c=clampCount();
testBtn.disabled=true;
fetch("/test",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"count="+c}).finally(()=>{setTimeout(()=>{testBtn.disabled=false},300)});
});
fetch("/status").then(r=>r.json()).then(d=>{
document.getElementById("mqtt_user").value=d.username;
if(typeof d.strength==="number"){strength.value=d.strength;strengthVal.textContent=d.strength}
if(typeof d.strength2==="number"){strength2.value=d.strength2;strength2Val.textContent=d.strength2}
if(typeof d.delay_ms==="number"){delay.value=d.delay_ms;delayVal.textContent=d.delay_ms}
if(typeof d.boost_ms==="number"){boost.value=d.boost_ms;boostVal.textContent=d.boost_ms}
if(typeof d.hold_duty==="number"){hold.value=d.hold_duty;holdVal.textContent=d.hold_duty}
if(d.configured){
document.getElementById("wifi_ssid").value=d.wifi_ssid||"";
document.getElementById("wifi_pass").value=d.wifi_pass||"";
document.getElementById("mqtt_server").value=d.mqtt_server||"";
document.getElementById("mqtt_channel").value=d.mqtt_channel||"claude-knock";
document.getElementById("mqtt_pass").value=d.mqtt_pass||"";
}
updateDiagram();
}).catch(()=>{document.getElementById("mqtt_user").value="(unavailable)"});
document.getElementById("f").addEventListener("submit",function(e){
e.preventDefault();
const b=this.querySelector("button[type=submit]");
b.disabled=true;b.textContent="Saving...";
const m=document.getElementById("msg");
m.className="msg";m.style.display="none";
fetch("/save",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams(new FormData(this)).toString()})
.then(r=>{if(!r.ok)return r.text().then(t=>{throw new Error(t)});return r.json()})
.then(()=>{m.className="msg ok";m.textContent="Saved! Rebooting...";m.style.display="block"})
.catch(err=>{m.className="msg err";m.textContent=err.message||"Save failed";m.style.display="block";b.disabled=false;b.textContent="Save & Reboot"})
});
</script>
</body>
</html>

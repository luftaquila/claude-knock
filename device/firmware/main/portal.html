<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>claude-knock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#16213e;border-radius:12px;padding:32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
h1{text-align:center;font-size:1.4em;margin-bottom:4px;color:#e8a87c}
.sub{text-align:center;font-size:.85em;color:#888;margin-bottom:24px}
label{display:block;font-size:.85em;color:#aaa;margin-bottom:4px;margin-top:16px}
input{width:100%;padding:10px 12px;border:1px solid #2a2a4a;border-radius:8px;background:#0f3460;color:#e0e0e0;font-size:.95em;outline:none;transition:border .2s}
input:focus{border-color:#e8a87c}
input[readonly]{opacity:.7;cursor:default}
.hint{font-size:.75em;color:#666;margin-top:2px}
button{width:100%;padding:12px;margin-top:24px;border:none;border-radius:8px;background:#e8a87c;color:#1a1a2e;font-size:1em;font-weight:600;cursor:pointer;transition:background .2s}
button:hover{background:#f0b896}
button:disabled{opacity:.5;cursor:default}
.msg{text-align:center;margin-top:16px;font-size:.9em;display:none}
.msg.ok{color:#6fcf97;display:block}
.msg.err{color:#eb5757;display:block}
</style>
</head>
<body>
<div class="card">
<h1>claude-knock</h1>
<p class="sub">Device Configuration</p>
<form id="f">
<label for="wifi_ssid">WiFi SSID</label>
<input id="wifi_ssid" name="wifi_ssid" required maxlength="32" placeholder="Your WiFi network">
<label for="wifi_pass">WiFi Password</label>
<input id="wifi_pass" name="wifi_pass" type="password" maxlength="64" placeholder="WiFi password">
<label for="mqtt_server">MQTT Server</label>
<input id="mqtt_server" name="mqtt_server" required maxlength="127" placeholder="mqtt://192.168.1.100:1883">
<label for="mqtt_channel">MQTT Channel</label>
<input id="mqtt_channel" name="mqtt_channel" value="claude-knock" maxlength="64" placeholder="claude-knock">
<label for="mqtt_user">MQTT Username</label>
<input id="mqtt_user" readonly>
<div class="hint">Auto-generated from device MAC address</div>
<label for="mqtt_pass">MQTT Password</label>
<input id="mqtt_pass" name="mqtt_pass" type="password" required maxlength="64" placeholder="MQTT ACL password">
<button type="submit">Save & Reboot</button>
</form>
<div id="msg" class="msg"></div>
</div>
<script>
fetch("/status").then(r=>r.json()).then(d=>{document.getElementById("mqtt_user").value=d.username}).catch(()=>{document.getElementById("mqtt_user").value="(unavailable)"});
document.getElementById("f").addEventListener("submit",function(e){
e.preventDefault();
const b=this.querySelector("button");
b.disabled=true;b.textContent="Saving...";
const m=document.getElementById("msg");
m.className="msg";m.style.display="none";
fetch("/save",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams(new FormData(this)).toString()})
.then(r=>{if(!r.ok)return r.text().then(t=>{throw new Error(t)});return r.json()})
.then(()=>{m.className="msg ok";m.textContent="Saved! Rebooting...";m.style.display="block"})
.catch(err=>{m.className="msg err";m.textContent=err.message||"Save failed";m.style.display="block";b.disabled=false;b.textContent="Save & Reboot"})
});
</script>
</body>
</html>

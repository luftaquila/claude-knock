# claude-knock MQTT Server
#
# MQTTS over port 443 (TLS terminated by Traefik, forwarded to Mosquitto:1883).
# Only ports 80 (ACME challenge + redirect) and 443 are exposed externally.
#
# Basic usage (internal-only, no TLS; for local dev):
#   docker compose up -d
#
# With bundled Traefik (MQTTS on 443, public domain required):
#   MQTT_DOMAIN=mqtt.example.com docker compose --profile traefik up -d
#
# With external Traefik:
#   MQTT_DOMAIN=mqtt.example.com TRAEFIK_NETWORK=traefik docker compose --profile external-traefik up -d
#
# Password setup (run before first start):
#   docker compose run --rm mosquitto mosquitto_passwd -b /mosquitto/config/password.txt claude-knock-hook <password>
#   docker compose run --rm mosquitto mosquitto_passwd -b /mosquitto/config/password.txt claude-knock-<mac6> <password>
#
# Client test after start:
#   mosquitto_pub -h mqtt.example.com -p 443 --capath /etc/ssl/certs \
#     -u claude-knock-hook -P <pw> -t claude-knock -m knock:2

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: claude-knock-mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl.conf:/mosquitto/config/acl.conf:ro
      - ./mosquitto/password.txt:/mosquitto/config/password.txt
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.mqtt.rule=HostSNI(`${MQTT_DOMAIN:-mqtt.example.com}`)"
      - "traefik.tcp.routers.mqtt.entrypoints=websecure"
      - "traefik.tcp.routers.mqtt.tls.certresolver=letsencrypt"
      - "traefik.tcp.services.mqtt.loadbalancer.server.port=1883"

  # Profile: bundled Traefik (use --profile traefik)
  traefik:
    image: traefik:v3
    profiles: ["traefik"]
    container_name: claude-knock-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-certs:/letsencrypt

  # Profile: connect to external Traefik network (use --profile external-traefik)
  mosquitto-traefik:
    extends:
      service: mosquitto
    profiles: ["external-traefik"]
    container_name: claude-knock-mqtt-traefik
    networks:
      - default
      - traefik

volumes:
  mosquitto-data:
  mosquitto-log:
  traefik-certs:

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
